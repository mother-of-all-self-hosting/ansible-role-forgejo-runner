---
- name: Ensure Forgejo Runner paths exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0750"
    owner: "{{ forgejo_runner_uid }}"
    group: "{{ forgejo_runner_gid }}"
  with_items:
    - "{{ forgejo_runner_base_path }}"
    - "{{ forgejo_runner_config_path }}"

- name: Ensure Forgejo Runner support files are installed
  ansible.builtin.template:
    src: "{{ role_path }}/templates/{{ item }}.j2"
    dest: "{{ forgejo_runner_base_path }}/{{ item }}"
    mode: "0640"
    owner: "{{ forgejo_runner_uid }}"
    group: "{{ forgejo_runner_gid }}"
  with_items:
    - env
  register: forgejo_runner_support_files_result

- name: Ensure Forgejo Runner configuration file installed
  ansible.builtin.copy:
    content: "{{ forgejo_runner_configuration | to_nice_yaml(indent=2, width=999999) }}"
    dest: "{{ forgejo_runner_config_path }}/config.yaml"
    mode: "0640"
    owner: "{{ forgejo_runner_uid }}"
    group: "{{ forgejo_runner_gid }}"
  register: forgejo_runner_config_file_result

- name: Ensure Forgejo Runner container image is pulled via community.docker.docker_image_pull
  when: devture_systemd_docker_base_container_image_pull_method == 'ansible-module'
  community.docker.docker_image_pull:
    name: "{{ forgejo_runner_container_image }}"
    pull: always
  register: forgejo_runner_container_image_pull_result_ansible_module
  retries: "{{ devture_playbook_help_container_retries_count }}"
  delay: "{{ devture_playbook_help_container_retries_delay }}"
  until: forgejo_runner_container_image_pull_result_ansible_module is not failed

- name: Ensure Forgejo Runner container image is pulled via ansible.builtin.command
  when: devture_systemd_docker_base_container_image_pull_method == 'command'
  ansible.builtin.command:
    cmd: "{{ devture_systemd_docker_base_host_command_docker }} pull {{ forgejo_runner_container_image }}"
  register: forgejo_runner_container_image_pull_result_command
  retries: "{{ devture_playbook_help_container_retries_count }}"
  delay: "{{ devture_playbook_help_container_retries_delay }}"
  until: forgejo_runner_container_image_pull_result_command is not failed
  changed_when: "'Downloaded newer image' in forgejo_runner_container_image_pull_result_command.stdout"

- name: Ensure Forgejo Runner container network is created via community.docker.docker_network
  when: devture_systemd_docker_base_container_network_creation_method == 'ansible-module'
  community.docker.docker_network:
    enable_ipv6: "{{ devture_systemd_docker_base_ipv6_enabled }}"
    name: "{{ forgejo_runner_container_network }}"
    driver: bridge
    driver_options: "{{ devture_systemd_docker_base_container_networks_driver_options }}"
  register: forgejo_runner_network_creation_result

- name: Ensure Forgejo Runner container network is created via ansible.builtin.command
  when: devture_systemd_docker_base_container_network_creation_method == 'command'
  ansible.builtin.command:
    cmd: >-
      {{ devture_systemd_docker_base_host_command_docker }} network create
      {% if devture_systemd_docker_base_ipv6_enabled %}--ipv6{% endif %}
      {{ devture_systemd_docker_base_container_networks_driver_options_string }}
      {{ forgejo_runner_container_network }}
  register: forgejo_runner_network_creation_result
  changed_when: forgejo_runner_network_creation_result.rc == 0
  failed_when: forgejo_runner_network_creation_result.rc != 0 and 'already exists' not in forgejo_runner_network_creation_result.stderr

- name: Ensure Forgejo Runner systemd service is present
  ansible.builtin.template:
    src: "{{ role_path }}/templates/systemd/forgejo-runner.service.j2"
    dest: "{{ devture_systemd_docker_base_systemd_path }}/{{ forgejo_runner_identifier }}.service"
    mode: "0644"
  register: forgejo_runner_systemd_service_result

- name: Determine whether Forgejo Runner needs a restart
  ansible.builtin.set_fact:
    forgejo_runner_restart_necessary: >-
      {{
        forgejo_runner_support_files_result.changed | default(false)
        or forgejo_runner_config_file_result.changed | default(false)
        or forgejo_runner_systemd_service_result.changed | default(false)
        or forgejo_runner_container_image_pull_result_ansible_module.changed | default(false)
        or forgejo_runner_container_image_pull_result_command.changed | default(false)
      }}
